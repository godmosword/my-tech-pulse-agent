name: Backfill GDELT

on:
  workflow_dispatch:
    inputs:
      start:
        description: "UTC+8 start date YYYY-MM-DD"
        required: true
        default: "2026-05-01"
      end:
        description: "UTC+8 end date YYYY-MM-DD (inclusive)"
        required: true
        default: "2026-05-19"
      theme:
        description: "Theme filter"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ai
          - semi
          - crypto
          - combined
      max_per_day:
        description: "Max records per day per theme"
        required: false
        default: "75"
      commit:
        description: "Actually write to Firestore (false = dry run)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Run GDELT backfill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        run: |
          ARGS="--start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }} --theme ${{ github.event.inputs.theme }} --max-per-day ${{ github.event.inputs.max_per_day }}"
          if [ "${{ github.event.inputs.commit }}" = "true" ]; then
            ARGS="$ARGS --commit"
          fi
          python -m scripts.backfill_gdelt $ARGS
