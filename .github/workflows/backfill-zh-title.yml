name: Backfill zh_title

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max docs to process (0 = unlimited)"
        required: false
        default: "0"
      dry_run:
        description: "Dry run only (no writes)"
        type: boolean
        required: false
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run backfill
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIRESTORE_COLLECTION_PREFIX: ${{ secrets.FIRESTORE_COLLECTION_PREFIX }}
        run: |
          ARGS="--limit ${{ github.event.inputs.limit }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/backfill_zh_title.py $ARGS
