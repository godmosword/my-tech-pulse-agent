name: CI and Deploy

on:
  push:
    branches: [main]
    # Skip the rebuild/redeploy when a commit only refreshes dashboard data
    # artifacts (see refresh-invest-artifacts.yml). Commits that also touch code
    # still trigger CI normally.
    paths-ignore:
      - 'backtest/results/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/tech-pulse:${{ github.sha }}

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Pyright (core packages)
        run: pyright

      - name: Vulture dead code
        run: vulture . scripts/vulture_whitelist.py --exclude dashboard,node_modules,.venv,venv --min-confidence 80

      - name: Run tests with coverage
        run: >
          pytest -q
          --cov=agents --cov=sources --cov=scoring --cov=pipeline
          --cov=delivery --cov=llm --cov=backtest
          --cov-fail-under=62

  dashboard:
    name: dashboard (lint, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, dashboard]
    concurrency:
      group: deploy-cloudrun
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run Job
        run: |
          gcloud run jobs update "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --update-env-vars DIGEST_FORMAT=v1

  deploy-staging:
    name: Deploy staging job (semantic prefilter)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy
    if: ${{ vars.CLOUD_RUN_STAGING_JOB != '' }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy staging Cloud Run Job
        run: |
          gcloud run jobs update "${{ vars.CLOUD_RUN_STAGING_JOB }}" \
            --image "${{ env.IMAGE }}" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --update-env-vars TECH_PULSE_ENV=staging,DIGEST_FORMAT=v1
