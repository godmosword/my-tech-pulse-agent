name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - "scoring/score_config.yaml"
      - "sources/kol_registry.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID:    ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:        asia-east1
  CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE || 'tech-pulse' }}
  GAR_REPOSITORY:    ${{ secrets.GAR_REPOSITORY }}
  IMAGE_URI:         ${{ secrets.GCP_PROJECT_ID && format('asia-east1-docker.pkg.dev/{0}/{1}/{2}:{3}', secrets.GCP_PROJECT_ID, secrets.GAR_REPOSITORY, secrets.CLOUD_RUN_SERVICE || 'tech-pulse', github.sha) }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-cloudrun
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_URI }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run Job
        run: |
          gcloud run jobs deploy "${CLOUD_RUN_SERVICE}" \
            --image "$IMAGE_URI" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --quiet
