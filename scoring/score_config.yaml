thresholds:
  default: 7.2        # general news items (raised for higher signal)
  earnings: 7.5       # stricter — financial facts require higher quality
  social_signal: 4.0  # looser — social is signal-only, not content
  kol: 5.5            # looser — older analysis pieces still carry value

weights:
  relevance: 0.4      # Is this meaningful tech/business news?
  novelty: 0.3        # Is this new information, not a rehash?
  depth: 0.3          # Does it contain specific facts, not just headlines?

# KOL items use a different weight profile: depth matters most, novelty downgraded
# because a week-old analysis piece can still be highly valuable.
kol_weights:
  relevance: 0.3
  novelty: 0.2
  depth: 0.5

source_weights:
  bloomberg_rss: 1.1
  techcrunch_rss: 1.0
  theverge_rss: 1.0
  ars_technica_rss: 1.05
  wired_rss: 1.0
