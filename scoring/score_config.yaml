thresholds:
  default: 6.8        # general news items (lowered from 7.2 to let crypto/semi/AI signal through)
  earnings: 7.5       # stricter — financial facts require higher quality
  social_signal: 4.0  # looser — social is signal-only, not content
  kol: 5.5            # looser — older analysis pieces still carry value

weights:
  relevance: 0.4      # Is this meaningful tech/business news?
  novelty: 0.3        # Is this new information, not a rehash?
  depth: 0.3          # Does it contain specific facts, not just headlines?

# KOL items use a different weight profile: depth matters most, novelty downgraded
# because a week-old analysis piece can still be highly valuable.
kol_weights:
  relevance: 0.3
  novelty: 0.2
  depth: 0.5

source_weights:
  bloomberg_rss: 1.1
  techcrunch_rss: 1.0
  theverge_rss: 1.0
  ars_technica_rss: 1.05
  wired_rss: 1.0
  # crypto sources — boosted so they can clear the default threshold
  coindesk_rss: 1.15
  decrypt_rss: 1.10
  theblock_rss: 1.10
  # semiconductor & AI analysis
  anandtech_rss: 1.10
  ieee_spectrum_rss: 1.05
  semianalysis_rss: 1.15
  huggingface_blog_rss: 1.10
  openai_news_rss: 1.10
  reuters_tech_rss: 1.05
  # KOL / newsletter sources
  simon_willison: 1.05
  latent_space: 1.05
  interconnects_ai: 1.05
  semianalysis: 1.1
  high_scalability: 1.0
  manny_newsletter: 1.5
  blocktrend: 1.5
  blocktempo_opinion: 1.2
